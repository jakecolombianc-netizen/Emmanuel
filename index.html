<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lecturas Psíquicas</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    background: radial-gradient(circle at top, #1a0033, #000000 80%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px 30px;
}

.hero h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.2em;
    color: #e0c3fc;
}

.hero p {
    font-size: 1em;
    opacity: 0.85;
}

/* DONACION (REEMPLAZA IMAGEN) */
.donacion {
    text-align: center;
    margin: 30px auto;
    max-width: 600px;
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    border: 1px solid rgba(224,195,252,0.3);
    box-shadow: 0 0 25px rgba(138,43,226,0.3);
}

.donacion p {
    line-height: 1.6;
    font-size: 0.95em;
}

.highlight {
    color: #c084fc;
    font-weight: 600;
}

/* SECCIONES */
.section {
    padding: 40px 20px;
    text-align: center;
}

h2 {
    font-family: 'Cinzel', serif;
    color: #e0c3fc;
}

/* TEXTO */
.section p {
    max-width: 600px;
    margin: auto;
    line-height: 1.6;
    opacity: 0.9;
}

/* FORM */
</html>
